# DLIO config for M3DGR Mid-360 sequences (outdoor, feature/livox-support)
#
# Topics (set via launch args, not in this config):
#   Livox:  /livox/mid360/lidar   (livox_ros_driver2/CustomMsg, native subscriber)
#   IMU:    /livox/mid360/imu
#
# Extrinsics: from M3DGR Mid-360 dataset config.
# Body frame = IMU frame, so baselink2imu = identity.

dlio:

  version: 1.2.0

  adaptive: true

  pointcloud:
    deskew: true
    voxelize: true

  imu:
    calibration: true
    # M3DGR Mid-360 IMU publishes in g-units (not m/s^2).
    # normalized=true means DLIO multiplies accel by 9.80665.
    # Evidence: ig_lio init prints show ||mean_acc|| = 9.77 m/s^2
    # (= 1.00 g) AFTER the g-to-m/s^2 scaling, confirming g-unit input.
    normalized: true
    intrinsics:
      accel:
        bias: [ 0.0, 0.0, 0.0 ]
        sm:   [ 1.,  0.,  0.,
                0.,  1.,  0.,
                0.,  0.,  1. ]
      gyro:
        bias: [ 0.0, 0.0, 0.0 ]

  extrinsics:
    baselink2imu:
      t: [ 0.0, 0.0, 0.0 ]
      R: [ 1.,  0.,  0.,
           0.,  1.,  0.,
           0.,  0.,  1. ]
    baselink2lidar:
      # IMU->LiDAR translation from M3DGR Mid-360 dataset
      t: [ -0.011, -0.02329, 0.04412 ]
      R: [ 1.,  0.,  0.,
           0.,  1.,  0.,
           0.,  0.,  1. ]
