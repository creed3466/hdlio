# iG-LIO config for M3DGR Mid-360 sequences.
#
# Lidar topic = /livox/mid360/lidar_v1, produced by the
# livox_v2_to_v1_republish sidecar from the bag's native
# /livox/mid360/lidar (livox_ros_driver2/CustomMsg). Namespace-only
# republish — identical MD5, zero data transformation.
# See baselines/docs/phase3_mid360_plan.md.
lidar_topic: /livox/mid360/lidar_v1
imu_topic: /livox/mid360/imu
lidar_type: livox
min_radius: 0.5
max_radius: 100.0
point_filter_num: 3
time_scale: 1000.0
enable_ahrs_initalization: false
enable_acc_correct: true

scan_resolution: 0.5
voxel_map_resolution: 0.5
max_iterations: 10

acc_cov: 0.1
gyr_cov: 0.1
ba_cov: 0.000001
bg_cov: 0.000001

gicp_constraints_gain: 100.0
point2plane_constraints_gain: 1000.0
enable_undistort: true
enable_outlier_rejection: true

gravity: 9.80665
init_ori_cov: 0.0001
init_pos_cov: 0.0001
init_vel_cov: 100.0
init_ba_cov: 0.000001
init_bg_cov: 0.000001

# Mid-360 extrinsics
t_imu_lidar : [-0.011, -0.02329, 0.04412]
R_imu_lidar : [1, 0, 0,
                0, 1, 0,
                0, 0, 1]
