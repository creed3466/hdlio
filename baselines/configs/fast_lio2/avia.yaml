# FAST-LIO2 config for M3DGR Avia sequences
# Based on upstream avia.yaml with topic remaps for M3DGR naming.
common:
    lid_topic:  "/livox/avia/lidar"
    imu_topic:  "/livox/avia/imu"
    time_sync_en: false
    time_offset_lidar_to_imu: 0.0

preprocess:
    lidar_type: 1                # 1 = Livox
    scan_line: 6
    blind: 4

mapping:
    acc_cov: 0.1
    gyr_cov: 0.1
    b_acc_cov: 0.0001
    b_gyr_cov: 0.0001
    fov_degree:    90
    det_range:     450.0
    extrinsic_est_en: false
    extrinsic_T: [ 0.04165, 0.02326, -0.0284 ]
    extrinsic_R: [ 1, 0, 0,
                   0, 1, 0,
                   0, 0, 1 ]

publish:
    path_en: true
    scan_publish_en: false
    dense_publish_en: false
    scan_bodyframe_pub_en: false

pcd_save:
    pcd_save_en: false
    interval: -1
