# FAST-LIO2 config for M3DGR Mid-360 sequences.
#
# Lidar topic = /livox/mid360/lidar_v1, produced by the
# livox_v2_to_v1_republish sidecar from the bag's native
# /livox/mid360/lidar (livox_ros_driver2/CustomMsg). The sidecar
# morphs the datatype to livox_ros_driver/CustomMsg (identical MD5,
# identical wire bytes) so v1-only FAST-LIO2 can deserialise it.
# See baselines/docs/phase3_mid360_plan.md §Republisher design.
common:
    lid_topic:  "/livox/mid360/lidar_v1"
    imu_topic:  "/livox/mid360/imu"
    time_sync_en: false
    time_offset_lidar_to_imu: 0.0

preprocess:
    lidar_type: 1                # 1 = Livox
    scan_line: 4                 # Mid-360 non-repetitive 4-lane sampling
    blind: 1.0

mapping:
    acc_cov: 0.1
    gyr_cov: 0.1
    b_acc_cov: 0.0001
    b_gyr_cov: 0.0001
    fov_degree:    360           # Mid-360 is 360-deg
    det_range:     100.0
    extrinsic_est_en: false
    extrinsic_T: [ -0.011, -0.02329, 0.04412 ]
    extrinsic_R: [ 1, 0, 0,
                   0, 1, 0,
                   0, 0, 1 ]

publish:
    path_en: true
    scan_publish_en: false
    dense_publish_en: false
    scan_bodyframe_pub_en: false

pcd_save:
    pcd_save_en: false
    interval: -1
