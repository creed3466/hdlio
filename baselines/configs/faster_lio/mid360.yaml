# Faster-LIO config for M3DGR Mid-360 sequences.
#
# Lidar topic = /livox/mid360/lidar_v1, produced by the
# livox_v2_to_v1_republish sidecar from the bag's native
# /livox/mid360/lidar (livox_ros_driver2/CustomMsg).
common:
    lid_topic: "/livox/mid360/lidar_v1"
    imu_topic: "/livox/mid360/imu"
    time_sync_en: false

preprocess:
    lidar_type: 1                # 1 = Livox
    scan_line: 4                 # Mid-360 non-repetitive 4-lane sampling
    blind: 0.5

mapping:
    acc_cov: 0.1
    gyr_cov: 0.1
    b_acc_cov: 0.0001
    b_gyr_cov: 0.0001
    fov_degree: 360              # Mid-360 is 360-deg
    det_range: 100.0
    extrinsic_est_en: false
    extrinsic_T: [ -0.011, -0.02329, 0.04412 ]
    extrinsic_R: [ 1, 0, 0,
                   0, 1, 0,
                   0, 0, 1 ]

publish:
    path_publish_en: true
    scan_publish_en: false
    dense_publish_en: false
    scan_bodyframe_pub_en: false

path_save_en: true

pcd_save:
    pcd_save_en: false
    interval: -1

feature_extract_enable: false
point_filter_num: 1
max_iteration: 3
filter_size_surf: 0.1
filter_size_map: 0.3
cube_side_length: 1000

ivox_grid_resolution: 0.1
ivox_nearby_type: 18
esti_plane_threshold: 0.1
