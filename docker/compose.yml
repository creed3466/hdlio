services:
  tofslam_ros1:
    container_name: tofslam_ros1
    image: tofslam:ros1
    working_dir: /root/catkin_ws
    entrypoint: ["/ros_entrypoint.sh"]
    command: ["bash", "-lc", "sleep infinity"]
    stdin_open: true
    tty: true
    network_mode: host
    ipc: host
    shm_size: "4gb"
    environment:
      DISPLAY: "${DISPLAY:-}"
      QT_X11_NO_MITSHM: "1"
      LIBGL_ALWAYS_SOFTWARE: "1"
      ROS_MASTER_URI: "http://localhost:11311"
      ROS_HOSTNAME: "localhost"
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ../src:/root/catkin_ws/src
      - ../docker:/root/catkin_ws/docker:ro
      - ../dump:/root/catkin_ws/dump
      - /home/euntae/Project/dataset/ros1/ntu_viral:/root/catkin_ws/data/ntu_viral:ro
      - /home/euntae/Project/dataset/ros1/m3dgr:/root/catkin_ws/data/m3dgr:ro
      - /home/euntae/Project/dataset/ros_humble/m3dgr:/root/catkin_ws/data/m3dgr_mid360:ro
      - /home/euntae/Project/dataset/ros1/surfel_data:/root/catkin_ws/data/m3dgr_surfel:ro
