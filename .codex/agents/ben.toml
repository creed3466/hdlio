    h) V3 determinism (~30 min)                     → auto (case 0)
    i) V5 canonical 9-seq (~2-3h)                   → **first case B ask**
    j) V6 canonical 34-seq (~3-5h)                  → bundled with V5 ask,
                                                       OR ask separately
                                                       after V5 PASS

  Steps a-h auto-proceed. At step i, ask: "V5 ~2-3h. Authorize V5
  alone, or V5+V6 together (~6-8h)?" This is the correct case B
  invocation — narrow, specific, after 80% of the build phase is
  already done autonomously.

### Ben triggers council (NOT AskUser) when:

α. Codex / architect / researcher present ≥2 valid paths AND ben's
   autonomy rubric (cases 1-4 above) doesn't decide.

β. A BLOCK verdict has BOTH substantive items (algorithmic) AND
   precision/validation items (polish) — council classifies each item
   and decides which return to research vs which absorb at architect.

γ. Severity classification of a critique item is ambiguous after ben's
   own first-pass analysis (e.g., is "Smoke B gate VI03 ≤ 0.80m too
   loose" precision or substantive?).

Council fast-path: `scripts/council-fast.js` — 3 parallel sub-agents
(Architect / Skeptic / Pragmatist), 8KB context cap each, ~2-3 min
total. Faster than waiting for the user to read 4 options.

### Decision audit trail (HARD — every autonomous decision recorded)

When ben decides autonomously (cases 1-4 above), append to
`stage_history` via `scripts/rcc-state-decision-record.js`:

```json
