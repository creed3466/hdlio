## Agent Verdict Convention (HARD)

The `post:agent:stage-record` hook auto-detects the verdict of each
sub-agent response and appends it to `.claude/research-state.json`.
Detection is regex-based; an unrecognized verdict is recorded as
`PENDING` and `current_stage` does **not** advance.

**Canonical form — always preferred:**

| Verdict | When to use | Hook action |
|---|---|---|
| `VERDICT: PASS` | Work complete, ready for next stage | Advance current_stage |
| `VERDICT: REVISE` | Same-stage revision needed (≤ 6 items) | Stay in current_stage |
| `VERDICT: BLOCK` | Fundamental issue — abort or backtrack | Stay; trigger backtrack logic |

**Tolerated equivalent forms** (recorded with the same effect):

- PASS — `READY_FOR_CODEX_REVIEW`, `READY_FOR_ARCHITECT`, `READY_FOR_BUILD`,
  `READY_FOR_EVAL`, `## PASS`, `## APPROVED`, `## OK`
- REVISE — `NEEDS_REVISION`, `NEEDS_FURTHER_REVISION`, `PASS_WITH_REVISIONS`,
  `CONDITIONAL_APPROVE`, `## REVISE`, plain `needs revision`
- BLOCK — `ABORT_RECOMMENDED`, `RULE 16`, `EMPIRICALLY_FALSIFIED`,
  `catastrophic FAIL`, `## BLOCK`, `## ABORT`, `## FAIL`, plain
  `critical issue`

**Mixed-signal precedence:** BLOCK > REVISE > PASS. A response that says
"originally `READY_FOR_BUILD` but `ABORT_RECOMMENDED` after retest" is
recorded as BLOCK.

When instructing sub-agents, prefer:

> End your response with exactly one line: `VERDICT: PASS|REVISE|BLOCK`.

If the verdict is ambiguous (no marker), the hook records `PENDING`. Ben
should then either re-dispatch with explicit verdict instruction, or
update state manually via `scripts/lib/research-state.js`.

## Universal R&D Rules (HARD)

These apply to all projects. Project CLAUDE.md may extend, never disable.

1. **Mathematical rigor precedes implementation** — derive before code.
2. **Reproducibility is non-negotiable** — record baseline, config, comparison target.
3. **Reproduction before improvement** — verify baseline reproduces before claiming gains.
4. **Fail fast, one variable at a time** — change one thing per experiment.
5. **Statistical significance required** — no conclusion from a single run unless determinism is proven.
6. **Primary sources first** — official docs, papers, reference implementations.
7. **No regression on secured results** — do not silently degrade prior verified outcomes. If a sprint formally suspends this rule, document the suspension scope and end date.
8. **Algorithm checkpoint discipline** — before modifying core algorithm code, create a git checkpoint commit. On verification failure, roll back. Single change per commit.
9. **Dataset-/seq-specific specialization permitted** — only with theoretical justification and isolation from other paths.
10. **ADBE iteration for performance sprints** — Analysis → Design → Build → Eval cycles, each with a written report.
11. **Scope discipline** — if the project's `CLAUDE.md` defines a scope (e.g., "LIO only, no loop closure"), stay within it.
12. **Literature verification mandatory** — every cited numerical/mechanism claim must carry `[verified]` or `[unverified]`. Researcher must verify pre-Codex; Codex Review checks again.
13. **Theoretical bottleneck > heuristic tuning** — performance improvements must trace to mathematical bottleneck resolution, not parameter sweeps.
14. **Mathematically meaningful diagnostics** — log condition numbers, residual statistics, convergence indicators. Analyze trends, not just final scores.

## Adversarial Review (Mandatory Pre-Architect)

Research outputs must pass adversarial review before reaching Architect.

Required:
- one explicit review pass
- `codex-reviewer` agent for model-independence (preferred)
- `code-reviewer` agent if Codex unavailable (note the lost independence)

For each critique item, classify:
- Accept — fold into research artifact
- Rebut — explain why, in writing
- Defer — note as open question for later

Do not pass research into Architect with unresolved BLOCKING critiques.

## Iteration Logic

After Eval:

- **SUCCESS** — result strong enough to keep / ship forward
- **PARTIAL** — keep useful parts, revise weak parts
- **FAIL** — identify whether failure came from Research, Architect, or Build → restart from earliest broken stage

For ambiguous FAIL cases: trigger council to decide backtrack target.

## Reporting Style

Report briefly in this structure:

- Current stage
- What was established
- What remains uncertain
- Next delegated step (**ben dispatches in the SAME response** — per
  Decision Autonomy case 0. Do not separate report from dispatch.)

Do not narrate internal stage gate decisions unless the user asks. Show the verdict.

**Anti-pattern (DO NOT)**: output a closing line like:

> "다음 세션 권장 prompt: ..."
> "User should now run X"
> "Recommended next prompt: ..."
> "다음 단계 진행 시 알려주세요"

These violate Decision Autonomy case 0 (default loop). After eval
PASS, the response **must** include the next-stage dispatch (Agent
tool call). The pipeline continues inline. If user wants to pause,
they will explicitly say so — until then, keep going.

## Critical Rules

- No non-trivial implementation without passing through Architect.
- No research conclusion without verified evidence.
- No evaluation conclusion without a comparison target.
- No algorithm change without checkpoint commit.
- Implementation drift from architecture must be made explicit and the architecture updated.
- Prefer concise structured context over long prompt stuffing.
- When CLAUDE.md is present, treat it as project overlay; when absent, operate on this file's rules alone.
